spring.application.name=api-gateway

server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Gateway Discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#jwt
jwt.secret=miclavesupersecretamiclavesupersecret

spring.main.web-application-type=reactive

# Rutas explícitas para nuevos microservicios
spring.cloud.gateway.routes[0].id=mecanico-service
spring.cloud.gateway.routes[0].uri=lb://mecanico-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/mecanicos/**

spring.cloud.gateway.routes[1].id=venta-service
spring.cloud.gateway.routes[1].uri=lb://venta-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/ventas/**

spring.cloud.gateway.routes[2].id=security-service
spring.cloud.gateway.routes[2].uri=lb://security-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/security-events/**

# Logs estructurados para trazabilidad operacional
logging.level.com.taller_mecanico=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} level=%level service=${spring.application.name:-unknown} thread=%thread logger=%logger{36} message="%msg"%n
