spring.application.name=venta-service

server.port=8089

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/db_ventas
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT compartido con auth-service para validar tokens
jwt.secret=miclavesupersecretamiclavesupersecret

# Logs estructurados para trazabilidad operacional
logging.level.com.taller_mecanico=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} level=%level service=${spring.application.name:-unknown} thread=%thread logger=%logger{36} message="%msg"%n
